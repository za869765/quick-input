<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>登入 — 送驗單快速輸入器</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif;
    color: #fff;
    background: linear-gradient(125deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
    background-size: 300% 300%;
    animation: gradient 15s ease infinite;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* 浮動氣泡背景 */
  body::before, body::after {
    content: '';
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(40px);
    animation: float 20s infinite ease-in-out;
  }
  body::before { width: 400px; height: 400px; top: -100px; right: -100px; }
  body::after { width: 300px; height: 300px; bottom: -80px; left: -80px; animation-delay: -10s; }

  @keyframes gradient {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }
  @keyframes float {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(30px, -40px) scale(1.1); }
    66% { transform: translate(-20px, 30px) scale(0.95); }
  }

  .card {
    position: relative;
    z-index: 10;
    background: rgba(255, 255, 255, 0.18);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.25);
    border-radius: 24px;
    padding: 48px 40px;
    width: 380px;
    max-width: calc(100vw - 40px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    animation: slideUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes slideUp {
    from { transform: translateY(40px) scale(0.92); opacity: 0; }
    to { transform: translateY(0) scale(1); opacity: 1; }
  }

  .lock-icon {
    width: 72px; height: 72px;
    margin: 0 auto 20px;
    background: rgba(255,255,255,0.95);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    animation: pulse 2.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); box-shadow: 0 8px 32px rgba(0,0,0,0.25); }
  }

  h1 {
    font-size: 22px;
    text-align: center;
    margin-bottom: 6px;
    font-weight: 700;
    text-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  .subtitle {
    font-size: 13px;
    text-align: center;
    color: rgba(255,255,255,0.85);
    margin-bottom: 28px;
  }

  .input-wrap {
    position: relative;
    margin-bottom: 16px;
  }
  input {
    width: 100%;
    padding: 14px 18px;
    background: rgba(255,255,255,0.95);
    color: #2c3e50;
    border: 2px solid transparent;
    border-radius: 12px;
    font-size: 16px;
    outline: none;
    transition: all 0.2s;
    font-family: inherit;
  }
  input:focus {
    background: #fff;
    border-color: #ffc107;
    box-shadow: 0 0 0 4px rgba(255,193,7,0.3);
  }
  input.shake { animation: shake 0.5s; border-color: #ff5252; }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%,60% { transform: translateX(-8px); }
    40%,80% { transform: translateX(8px); }
  }

  button {
    width: 100%;
    padding: 14px;
    background: rgba(255,255,255,0.95);
    color: #764ba2;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
    box-shadow: 0 6px 16px rgba(0,0,0,0.15);
  }
  button:hover { transform: translateY(-2px); box-shadow: 0 10px 24px rgba(0,0,0,0.2); }
  button:active { transform: translateY(0); }
  button:disabled { opacity: 0.6; cursor: wait; }

  .err {
    margin-top: 12px;
    padding: 10px 14px;
    background: rgba(255,82,82,0.92);
    color: #fff;
    border-radius: 10px;
    font-size: 13px;
    text-align: center;
    display: none;
    animation: slideUp 0.3s;
  }
  .err.show { display: block; }

  .footer-hint {
    margin-top: 24px;
    font-size: 11.5px;
    text-align: center;
    color: rgba(255,255,255,0.7);
    line-height: 1.6;
  }
</style>
</head>
<body>

<form class="card" id="loginForm" autocomplete="off">
  <div class="lock-icon">🔒</div>
  <h1>送驗單快速輸入器</h1>
  <div class="subtitle">— 請輸入密碼 —</div>

  <div class="input-wrap">
    <input type="password" id="pwd" placeholder="密碼" autofocus required autocomplete="current-password">
  </div>

  <button type="submit" id="loginBtn">登 入</button>

  <div class="err" id="err"></div>

  <div class="footer-hint">
    🛡️ 本系統含個人敏感資料，請勿洩漏密碼。<br>
    Powered by Cloudflare Pages
  </div>
</form>

<script>
const form = document.getElementById('loginForm');
const pwd = document.getElementById('pwd');
const btn = document.getElementById('loginBtn');
const err = document.getElementById('err');

function showError(msg) {
  err.textContent = '✗ ' + msg;
  err.classList.add('show');
  pwd.classList.remove('shake');
  void pwd.offsetWidth;
  pwd.classList.add('shake');
  setTimeout(() => pwd.classList.remove('shake'), 600);
}

form.addEventListener('submit', async (ev) => {
  ev.preventDefault();
  const password = pwd.value.trim();
  if (!password) { showError('請輸入密碼'); return; }

  btn.disabled = true;
  btn.textContent = '驗證中...';
  err.classList.remove('show');

  try {
    const r = await fetch('/api/login', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ password })
    });
    const d = await r.json();
    if (d.ok) {
      btn.textContent = '✓ 登入成功';
      btn.style.background = '#4caf50';
      btn.style.color = '#fff';
      setTimeout(() => location.href = '/', 400);
    } else {
      showError(d.err || '登入失敗');
      btn.disabled = false;
      btn.textContent = '登 入';
      pwd.value = '';
      pwd.focus();
    }
  } catch (e) {
    showError('連線失敗：' + e.message);
    btn.disabled = false;
    btn.textContent = '登 入';
  }
});
</script>

</body>
</html>
