<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>登入 — 送驗單快速輸入器</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif;
    color: #fff;
    background: linear-gradient(125deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
    background-size: 300% 300%;
    animation: gradient 15s ease infinite;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* 浮動氣泡背景 */
  body::before, body::after {
    content: '';
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(40px);
    animation: float 20s infinite ease-in-out;
  }
  body::before { width: 400px; height: 400px; top: -100px; right: -100px; }
  body::after { width: 300px; height: 300px; bottom: -80px; left: -80px; animation-delay: -10s; }

  /* 紅絲帶 LOGO（HIV/AIDS 公益象徵）*/
  .ribbon-bg {
    position: fixed;
    top: 50%;
    left: 50%;
    width: 480px;
    height: 660px;
    transform: translate(-50%, -50%);
    opacity: 0.18;
    z-index: 1;
    pointer-events: none;
    animation: ribbonFade 3s ease-out, ribbonFloat 10s ease-in-out infinite alternate;
    filter: drop-shadow(0 10px 30px rgba(0,0,0,0.3));
  }
  @keyframes ribbonFade {
    from { opacity: 0; transform: translate(-50%, -40%) scale(0.9); }
    to { opacity: 0.18; transform: translate(-50%, -50%) scale(1); }
  }
  @keyframes ribbonFloat {
    from { transform: translate(-50%, -50%) rotate(-3deg); }
    to { transform: translate(-50%, -52%) rotate(3deg); }
  }

  @keyframes gradient {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }
  @keyframes float {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(30px, -40px) scale(1.1); }
    66% { transform: translate(-20px, 30px) scale(0.95); }
  }

  .card {
    position: relative;
    z-index: 10;
    background: rgba(255, 255, 255, 0.18);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.25);
    border-radius: 24px;
    padding: 48px 40px;
    width: 380px;
    max-width: calc(100vw - 40px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    animation: slideUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes slideUp {
    from { transform: translateY(40px) scale(0.92); opacity: 0; }
    to { transform: translateY(0) scale(1); opacity: 1; }
  }

  .lock-icon {
    width: 72px; height: 72px;
    margin: 0 auto 20px;
    background: rgba(255,255,255,0.95);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    animation: pulse 2.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); box-shadow: 0 8px 32px rgba(0,0,0,0.25); }
  }

  h1 {
    font-size: 22px;
    text-align: center;
    margin-bottom: 6px;
    font-weight: 700;
    text-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  .subtitle {
    font-size: 13px;
    text-align: center;
    color: rgba(255,255,255,0.85);
    margin-bottom: 28px;
  }

  .input-wrap {
    position: relative;
    margin-bottom: 16px;
  }
  input {
    width: 100%;
    padding: 14px 18px;
    background: rgba(255,255,255,0.95);
    color: #2c3e50;
    border: 2px solid transparent;
    border-radius: 12px;
    font-size: 16px;
    outline: none;
    transition: all 0.2s;
    font-family: inherit;
  }
  input:focus {
    background: #fff;
    border-color: #ffc107;
    box-shadow: 0 0 0 4px rgba(255,193,7,0.3);
  }
  input.shake { animation: shake 0.5s; border-color: #ff5252; }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%,60% { transform: translateX(-8px); }
    40%,80% { transform: translateX(8px); }
  }

  .status {
    margin-top: 16px;
    text-align: center;
    font-size: 13px;
    color: rgba(255,255,255,0.85);
    min-height: 22px;
    transition: all 0.3s;
  }
  .status.checking { color: rgba(255,255,255,0.9); }
  .status.ok {
    color: #4caf50;
    background: rgba(255,255,255,0.95);
    border-radius: 10px;
    padding: 10px 14px;
    font-weight: 700;
    animation: slideUp 0.3s;
  }
  .status.bad {
    color: #fff;
    background: rgba(255,82,82,0.92);
    border-radius: 10px;
    padding: 10px 14px;
    font-weight: 600;
    animation: slideUp 0.3s;
  }
  .pulse-dot {
    display: inline-block;
    width: 6px; height: 6px;
    background: rgba(255,255,255,0.7);
    border-radius: 50%;
    margin: 0 2px;
    animation: pulseDot 1.2s ease-in-out infinite;
  }
  .pulse-dot:nth-child(2) { animation-delay: 0.2s; }
  .pulse-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulseDot {
    0%,80%,100% { transform: scale(0.6); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; }
  }

  .footer-hint {
    margin-top: 24px;
    font-size: 11.5px;
    text-align: center;
    color: rgba(255,255,255,0.7);
    line-height: 1.6;
  }
</style>
</head>
<body>

<!-- 紅絲帶背景 LOGO -->
<svg class="ribbon-bg" viewBox="0 0 100 140" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <defs>
    <linearGradient id="ribGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef5350"/>
      <stop offset="60%" stop-color="#c62828"/>
      <stop offset="100%" stop-color="#7a0e0e"/>
    </linearGradient>
    <linearGradient id="ribShine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.3)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <g>
    <!-- 後條（左下擺，較暗）-->
    <path d="M 38,60 L 25,128 L 33,135 L 50,75 Z" fill="#7a0e0e"/>
    <!-- 前條（右下擺）-->
    <path d="M 62,60 L 75,128 L 67,135 L 50,75 Z" fill="url(#ribGrad)"/>
    <!-- 頂部彎環 -->
    <path d="M 50,8
             C 30,20 30,40 38,60
             L 50,75
             L 62,60
             C 70,40 70,20 50,8 Z"
          fill="url(#ribGrad)"/>
    <!-- 反光高亮 -->
    <path d="M 45,15 C 35,25 35,45 42,58 L 48,68 L 50,72 L 48,55 C 41,42 41,28 47,17 Z"
          fill="url(#ribShine)" opacity="0.5"/>
    <!-- 中央交叉陰影 -->
    <ellipse cx="50" cy="73" rx="6" ry="3" fill="#5a0808" opacity="0.6"/>
  </g>
</svg>

<form class="card" id="loginForm" autocomplete="off" onsubmit="return false">
  <div class="lock-icon">🔒</div>
  <h1>送驗單快速輸入器</h1>
  <div class="subtitle">— 請輸入密碼 —</div>

  <div class="input-wrap">
    <input type="password" id="pwd" placeholder="輸入密碼即自動驗證..." autofocus required autocomplete="current-password">
  </div>

  <div class="status" id="status">&nbsp;</div>

  <div class="footer-hint">
    🛡️ 本系統含個人敏感資料，請勿洩漏密碼。<br>
    Powered by Cloudflare Pages
  </div>
</form>

<script>
const pwd = document.getElementById('pwd');
const status = document.getElementById('status');

let tryTimer;
let lastTried = '';
let isLocked = false;

function setStatus(text, cls) {
  status.className = 'status' + (cls ? ' ' + cls : '');
  status.innerHTML = text;
}
function shake() {
  pwd.classList.remove('shake');
  void pwd.offsetWidth;
  pwd.classList.add('shake');
  setTimeout(() => pwd.classList.remove('shake'), 600);
}

async function tryLogin(password) {
  if (isLocked) return;
  if (password === lastTried) return;
  lastTried = password;
  setStatus('<span class="pulse-dot"></span><span class="pulse-dot"></span><span class="pulse-dot"></span> 驗證中...', 'checking');
  try {
    const r = await fetch('/api/login', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ password })
    });
    const d = await r.json();
    if (d.ok) {
      isLocked = true;
      setStatus('✓ 登入成功', 'ok');
      pwd.disabled = true;
      setTimeout(() => location.href = '/', 350);
    } else {
      // 密碼不對 → 清掉狀態，等使用者繼續輸入
      setStatus('&nbsp;');
    }
  } catch (e) {
    setStatus('✗ 連線失敗', 'bad');
  }
}

// 邊輸入邊驗：debounce 200ms，避免每個按鍵都打 API
pwd.addEventListener('input', () => {
  if (isLocked) return;
  clearTimeout(tryTimer);
  const v = pwd.value.trim();
  if (v.length < 3) { setStatus('&nbsp;'); return; }
  tryTimer = setTimeout(() => tryLogin(v), 220);
});

// 按 Enter 立即驗 + 錯了搖晃提示
pwd.addEventListener('keydown', async (ev) => {
  if (ev.key === 'Enter') {
    ev.preventDefault();
    if (isLocked) return;
    const v = pwd.value.trim();
    if (!v) return;
    clearTimeout(tryTimer);
    // 強制再試一次（即使是同樣密碼）
    lastTried = '';
    await tryLogin(v);
    if (!isLocked) {
      setStatus('✗ 密碼錯誤', 'bad');
      shake();
      pwd.select();
    }
  }
});
</script>

</body>
</html>
